<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saver3D - Site vitrine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .panel {
            width: 100%;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            background: #1a1a1a;
            color: #fff;
        }
        .panel button {
            padding: 0.5rem 1.25rem;
            font-size: 1rem;
            cursor: pointer;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
        }
        .panel button:hover { background: #444; }
        .centre {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            font-size: 2rem;
            color: #666;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <header class="panel">
        <a href="login.html" style="padding: 0.5rem 1.25rem; font-size: 1rem; background: #333; color: #fff; text-decoration: none; border: 1px solid #555; border-radius: 6px;">Accéder à l'app</a>
    </header>
    <main class="centre">prochainement</main>
</body>
</html>
